<!DOCTYPE html>
<html lang="cs">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Docházka Agent — ORBIS</title>
<style>
  :root {
    --red:    #E63329;
    --dark:   #111111;
    --gray:   #666666;
    --lgray:  #F4F4F4;
    --border: #E0E0E0;
    --green:  #27AE60;
    --white:  #FFFFFF;
  }
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  body {
    font-family: 'Segoe UI', system-ui, sans-serif;
    background: #F7F7F7;
    color: var(--dark);
    min-height: 100vh;
  }

  /* ── HEADER ── */
  header {
    background: var(--white);
    border-bottom: 1px solid var(--border);
    padding: 0 2rem;
    display: flex;
    align-items: center;
    gap: 1rem;
    height: 56px;
  }
  .logo-bar { width: 4px; height: 28px; background: var(--red); border-radius: 2px; flex-shrink: 0; }
  header h1 { font-size: 1rem; font-weight: 600; letter-spacing: -0.01em; }
  header span { font-size: 0.85rem; color: var(--gray); margin-left: auto; }

  /* ── LAYOUT ── */
  .container { max-width: 860px; margin: 0 auto; padding: 2rem 1.5rem 4rem; }

  /* ── STEPS ── */
  .steps { display: flex; gap: 0; margin-bottom: 2.5rem; }
  .step {
    display: flex; align-items: center; gap: 0.5rem;
    font-size: 0.8rem; font-weight: 500; color: var(--gray);
    padding: 0.5rem 1rem 0.5rem 0;
  }
  .step .num {
    width: 22px; height: 22px; border-radius: 50%;
    border: 2px solid var(--border);
    display: flex; align-items: center; justify-content: center;
    font-size: 0.72rem; font-weight: 700; flex-shrink: 0;
  }
  .step.active { color: var(--dark); }
  .step.active .num { border-color: var(--red); background: var(--red); color: var(--white); }
  .step.done .num { border-color: var(--green); background: var(--green); color: var(--white); }
  .step.done { color: var(--gray); }
  .step-sep { flex: 1; height: 1px; background: var(--border); margin: 0 0.25rem; align-self: center; min-width: 20px; }

  /* ── CARD ── */
  .card {
    background: var(--white);
    border: 1px solid var(--border);
    border-radius: 10px;
    padding: 1.75rem 2rem;
    margin-bottom: 1.25rem;
  }
  .card-title { font-size: 1rem; font-weight: 600; margin-bottom: 1.25rem; display: flex; align-items: center; gap: 0.5rem; }
  .card-title .dot { width: 6px; height: 6px; border-radius: 50%; background: var(--red); flex-shrink: 0; }

  /* ── FORM ── */
  .field { margin-bottom: 1.1rem; }
  label { display: block; font-size: 0.82rem; font-weight: 600; color: #444; margin-bottom: 0.35rem; }
  label .hint { font-weight: 400; color: var(--gray); font-size: 0.78rem; margin-left: 0.4rem; }
  input[type=text], input[type=password], input[type=month], select {
    width: 100%; padding: 0.6rem 0.85rem;
    border: 1px solid var(--border); border-radius: 6px;
    font-size: 0.9rem; font-family: inherit;
    background: var(--white); color: var(--dark);
    transition: border-color 0.15s;
    outline: none;
  }
  input:focus, select:focus { border-color: var(--red); }
  .field-row { display: grid; grid-template-columns: 1fr 1fr; gap: 1rem; }

  /* ── TAG INPUT ── */
  .tag-wrap {
    display: flex; flex-wrap: wrap; gap: 0.35rem;
    border: 1px solid var(--border); border-radius: 6px;
    padding: 0.45rem 0.6rem; min-height: 42px;
    background: var(--white); cursor: text; transition: border-color 0.15s;
  }
  .tag-wrap:focus-within { border-color: var(--red); }
  .tag {
    background: #FEE8E7; color: var(--red);
    border-radius: 4px; padding: 0.15rem 0.5rem;
    font-size: 0.8rem; font-weight: 600;
    display: flex; align-items: center; gap: 0.3rem;
  }
  .tag button { background: none; border: none; cursor: pointer; color: var(--red); font-size: 0.9rem; line-height: 1; padding: 0; }
  .tag-input {
    border: none; outline: none; font-size: 0.88rem;
    font-family: inherit; background: transparent;
    min-width: 80px; flex: 1;
  }

  /* ── BUTTONS ── */
  .btn {
    display: inline-flex; align-items: center; gap: 0.5rem;
    padding: 0.65rem 1.4rem; border-radius: 6px;
    font-size: 0.88rem; font-weight: 600; cursor: pointer;
    border: none; transition: all 0.15s; font-family: inherit;
  }
  .btn-primary { background: var(--red); color: var(--white); }
  .btn-primary:hover:not(:disabled) { background: #c9291f; }
  .btn-secondary { background: var(--lgray); color: var(--dark); border: 1px solid var(--border); }
  .btn-secondary:hover { background: #EBEBEB; }
  .btn-ghost { background: transparent; color: var(--gray); border: 1px solid var(--border); }
  .btn:disabled { opacity: 0.45; cursor: not-allowed; }
  .btn-row { display: flex; gap: 0.75rem; margin-top: 1.5rem; align-items: center; }

  /* ── TABLE ── */
  .table-wrap { overflow-x: auto; margin-top: 0.5rem; }
  table { width: 100%; border-collapse: collapse; font-size: 0.85rem; }
  th { text-align: left; font-size: 0.75rem; font-weight: 600; color: var(--gray); padding: 0.5rem 0.75rem; border-bottom: 2px solid var(--border); white-space: nowrap; }
  td { padding: 0.55rem 0.75rem; border-bottom: 1px solid var(--border); vertical-align: middle; }
  tr:last-child td { border-bottom: none; }
  tr:hover td { background: #FAFAFA; }

  td.key { font-family: 'Courier New', monospace; font-size: 0.8rem; font-weight: 700; color: var(--red); white-space: nowrap; }
  td.date { white-space: nowrap; color: var(--gray); font-size: 0.8rem; }
  td.hours { font-weight: 700; text-align: right; }
  td.summary { color: #333; max-width: 300px; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }

  /* edit hours inline */
  td input.hours-edit {
    width: 52px; text-align: right; padding: 0.2rem 0.4rem;
    font-size: 0.85rem; font-weight: 700; border: 1px solid var(--red);
    border-radius: 4px; outline: none;
  }

  /* ── STATUS / LOG ── */
  .status-bar {
    display: flex; align-items: center; gap: 0.6rem;
    padding: 0.75rem 1rem; border-radius: 7px;
    font-size: 0.85rem; margin-bottom: 1rem;
  }
  .status-bar.info { background: #EEF4FF; color: #2563EB; border: 1px solid #BFDBFE; }
  .status-bar.success { background: #ECFDF5; color: #059669; border: 1px solid #A7F3D0; }
  .status-bar.error { background: #FEF2F2; color: var(--red); border: 1px solid #FECACA; }
  .status-bar.warning { background: #FFFBEB; color: #D97706; border: 1px solid #FDE68A; }

  .log-box {
    background: #0D1117; color: #C9D1D9;
    border-radius: 8px; padding: 1rem 1.25rem;
    font-family: 'Courier New', monospace; font-size: 0.8rem;
    max-height: 240px; overflow-y: auto; line-height: 1.7;
  }
  .log-ok  { color: #4EC94E; }
  .log-err { color: #FF6B6B; }
  .log-info{ color: #9CDCFE; }
  .log-dim { color: #666; }

  /* ── SUMMARY CHIPS ── */
  .chips { display: flex; flex-wrap: wrap; gap: 0.5rem; margin-top: 0.75rem; }
  .chip {
    background: var(--lgray); border-radius: 20px;
    padding: 0.3rem 0.85rem; font-size: 0.8rem; font-weight: 600;
  }
  .chip .ch-key { color: var(--red); }
  .chip .ch-h   { color: var(--dark); }

  /* ── TOTAL ROW ── */
  .total-row {
    display: flex; justify-content: space-between; align-items: center;
    padding: 0.75rem 0.75rem; background: var(--lgray); border-radius: 6px;
    margin-top: 0.75rem; font-weight: 700;
  }
  .total-row .total-h { font-size: 1.15rem; color: var(--red); }

  /* ── SPINNER ── */
  .spinner {
    width: 16px; height: 16px;
    border: 2px solid rgba(255,255,255,0.3);
    border-top-color: white;
    border-radius: 50%; animation: spin 0.7s linear infinite;
    flex-shrink: 0;
  }
  .spinner.dark { border-color: rgba(0,0,0,0.15); border-top-color: var(--red); }
  @keyframes spin { to { transform: rotate(360deg); } }

  /* ── HIDDEN ── */
  .hidden { display: none !important; }

  /* ── PROGRESS BAR ── */
  .progress-wrap { background: var(--lgray); border-radius: 4px; height: 6px; margin: 0.5rem 0; overflow: hidden; }
  .progress-bar  { height: 100%; background: var(--red); border-radius: 4px; transition: width 0.3s; }
</style>
</head>
<body>

<header>
  <div class="logo-bar"></div>
  <h1>Docházka Agent</h1>
  
</header>

<div class="container">

  <!-- STEPS -->
  <div class="steps">
    <div class="step active" id="step1-ind"><div class="num">1</div> Přihlášení</div>
    <div class="step-sep"></div>
    <div class="step" id="step2-ind"><div class="num">2</div> Nastavení</div>
    <div class="step-sep"></div>
    <div class="step" id="step3-ind"><div class="num">3</div> Návrh</div>
    <div class="step-sep"></div>
    <div class="step" id="step4-ind"><div class="num">4</div> Odeslání</div>
  </div>

  <!-- STEP 1: Auth -->
  <div id="pane1">
    <div class="card">
      <div class="card-title"><div class="dot"></div>Připojení k Jiře</div>
      <div class="field">
        <label>E-mail <span class="hint">tvůj Jira účet</span></label>
        <input type="text" id="email" value="nina.pirkl@packeta.com" autocomplete="off">
      </div>
      <div class="field">
        <label>Jira API Token <span class="hint">z id.atlassian.com → Security → API tokens</span></label>
        <input type="password" id="token" placeholder="ATATT3x..." autocomplete="off">
      </div>

      <div id="auth-status" class="hidden"></div>
      <div class="btn-row">
        <button class="btn btn-primary" id="btn-auth">
          <span id="auth-spinner" class="spinner hidden"></span>
          Ověřit přihlášení
        </button>
      </div>
      <div style="margin-top:0.75rem;padding-top:0.75rem;border-top:1px solid var(--border)">
        <button class="btn btn-ghost" id="btn-mock" style="font-size:0.8rem">🧪 Načíst mock data (bez Jiry)</button>
        <span style="font-size:0.75rem;color:var(--gray);margin-left:0.75rem">pro testování bez tokenu</span>
      </div>
    </div>
  </div>

  <!-- STEP 2: Settings -->
  <div id="pane2" class="hidden">
    <div class="card">
      <div class="card-title"><div class="dot"></div>Nastavení měsíce</div>
      <div class="field-row">
        <div class="field">
          <label>Měsíc a rok</label>
          <div style="display:flex;gap:0.5rem">
            <select id="sel-month" style="flex:1">
              <option value="1">Leden</option><option value="2">Únor</option>
              <option value="3">Březen</option><option value="4">Duben</option>
              <option value="5">Květen</option><option value="6">Červen</option>
              <option value="7">Červenec</option><option value="8">Srpen</option>
              <option value="9">Září</option><option value="10">Říjen</option>
              <option value="11">Listopad</option><option value="12">Prosinec</option>
            </select>
            <select id="sel-year" style="width:100px"></select>
          </div>
        </div>
        <div class="field">
          <label>Standardní délka dne<span class="hint">hodin</span></label>
          <select id="std-hours">
            <option value="8" selected>8 hodin</option>
            <option value="7.5">7.5 hodin</option>
          </select>
        </div>
      </div>
      <div class="field">
        <label>Dny nepřítomnosti <span class="hint">který den v měsíci jsi nepracovala (dovolená, nemoc)</span></label>
        <div class="tag-wrap" id="daysoff-wrap">
          <input type="text" class="tag-input" id="daysoff-input" placeholder="zadej den v měsíci (např. 15) a stiskni Enter">
        </div>
      </div>
      <div class="field">
        <label>Přesčasy <span class="hint">den kdy jsi pracovala déle než standardně</span></label>
        <div class="tag-wrap" id="extra-wrap">
          <input type="text" class="tag-input" id="extra-input" placeholder="den=hodin (např. 22=10 → 22. dne 10 hodin) a Enter">
        </div>
      </div>
      <div class="field">
        <label>Kontext z Clauda <span class="hint">nepovinné — vlož JSON z chatu pro přesnější rozvrh</span></label>
        <textarea id="claude-context" rows="3" style="width:100%;padding:0.6rem 0.85rem;border:1px solid var(--border);border-radius:6px;font-size:0.82rem;font-family:monospace;resize:vertical;outline:none;transition:border-color 0.15s" placeholder='{"entries":[{"day":1,"key":"OBS-859","hours":6},{"day":1,"key":"OBS-888","hours":2}]}'></textarea>
        <div style="font-size:0.75rem;color:var(--gray);margin-top:0.3rem">Požádej Clauda v chatu: <em>"připrav kontext za [měsíc] pro agenta"</em></div>
      </div>
      <div class="btn-row">
        <button class="btn btn-secondary" id="btn-back1">← Zpět</button>
        <button class="btn btn-primary" id="btn-fetch">
          <span id="fetch-spinner" class="spinner hidden"></span>
          Načíst &amp; analyzovat
        </button>

    </div>
  </div>

  <!-- STEP 3: Preview -->
  <div id="pane3" class="hidden">
    <div class="card">
      <div class="card-title"><div class="dot"></div>Návrh přiřazení</div>

      <div id="ai-status" class="hidden"></div>
      <div id="preview-status" class="hidden"></div>

      <div class="table-wrap">
        <table id="preview-table">
          <thead>
            <tr>
              <th>Datum</th>
              <th>Task</th>
              <th>Popis</th>
              <th style="text-align:right">Hod.</th>
              <th></th>
            </tr>
          </thead>
          <tbody id="preview-body"></tbody>
        </table>
      </div>

      <button class="btn btn-ghost" id="btn-addrow" style="margin-top:0.5rem;font-size:0.8rem">+ Přidat záznam</button>

      <div class="total-row">
        <span>Celkem pracovních hodin</span>
        <span class="total-h" id="total-h">0h</span>
      </div>

      <div class="chips" id="task-chips"></div>

      <div class="btn-row">
        <button class="btn btn-secondary" id="btn-reset">← Zpět</button>
        <button class="btn btn-primary" id="btn-send">
          <span id="send-spinner" class="spinner hidden"></span>
          Odeslat do Clockwork
        </button>
        <button class="btn btn-ghost" id="btn-dryrun">🧪 Dry Run</button>
        <button class="btn btn-secondary" id="btn-csv">Stáhnout CSV</button>
      </div>
    </div>
  </div>

  <!-- STEP 4: Result -->
  <div id="pane4" class="hidden">
    <div class="card">
      <div class="card-title"><div class="dot"></div>Výsledek</div>
      <div id="result-status"></div>
      <div class="progress-wrap hidden" id="progress-wrap">
        <div class="progress-bar" id="progress-bar" style="width:0%"></div>
      </div>
      <div class="log-box" id="log-box"></div>
      <div class="btn-row">
        <button class="btn btn-secondary hidden" id="btn-back3">← Zpět na návrh</button>
        <button class="btn btn-primary hidden" id="btn-again">Nový měsíc</button>
      </div>
    </div>
  </div>

</div><!-- /container -->

<script>
// ── CONFIG ────────────────────────────────────────────────────────────────────
const JIRA_BASE = '';
const JIRA_PROXY = '/jira';
const PROJECTS  = ['OBS', 'TEST'];

// ── STATE ─────────────────────────────────────────────────────────────────────
let state = {
  auth: null,
  loggedDays: new Set(),
  sending: false,       // { email, token, displayName }
  year: null, month: null,
  daysOff: [],
  extraHours: {},   // day -> hours
  issues: [],       // [{key, summary}]
  entries: [],      // [{date, key, summary, hours}]
};

// ── HELPERS ───────────────────────────────────────────────────────────────────
const $  = id => document.getElementById(id);
const hdr = () => ({
  'X-Jira-Auth': 'Basic ' + btoa(state.auth.email + ':' + state.auth.token),
  'Content-Type': 'application/json',
  'Accept':       'application/json',
});

function showStatus(elId, type, msg) {
  const el = $(elId);
  el.className = 'status-bar ' + type;
  el.textContent = msg;
  el.classList.remove('hidden');
}

function setStep(n) {
  [1,2,3,4].forEach(i => {
    const ind = $('step'+i+'-ind');
    if (!ind) return;
    ind.className = 'step' + (i === n ? ' active' : i < n ? ' done' : '');
  });
  [1,2,3,4].forEach(i => {
    const p = $('pane'+i);
    if (p) p.classList.toggle('hidden', i !== n);
  });
}

function log(msg, cls='') {
  const box = $('log-box');
  const line = document.createElement('div');
  if (cls) line.className = cls;
  line.textContent = msg;
  box.appendChild(line);
  box.scrollTop = box.scrollHeight;
}

// České státní svátky (pevné datum). Velikonoce se počítají zvlášť.
function czechHolidays(year, month) {
  const fixed = {
    1:  [1],        // Nový rok
    5:  [1, 8],     // Svátek práce, Den vítězství
    7:  [5, 6],     // Cyril a Metoděj, Jan Hus
    9:  [28],       // Den české státnosti
    10: [28],       // Vznik ČSR
    11: [17],       // Boj za svobodu
    12: [24, 25, 26], // Vánoce
  };
  const days = [...(fixed[month] || [])];
  // Velikonoční pátek + pondělí (Meeus/Jones/Butcher algoritmus)
  const a=year%19, b=Math.floor(year/100), c=year%100, d=Math.floor(b/4), e=b%4,
        f=Math.floor((b+8)/25), g=Math.floor((b-f+1)/3), h=(19*a+b-d-g+15)%30,
        i=Math.floor(c/4), k=c%4, l=(32+2*e+2*i-h-k)%7, m=Math.floor((a+11*h+22*l)/451);
  const emonth=Math.floor((h+l-7*m+114)/31), eday=((h+l-7*m+114)%31)+1;
  const easterSunday = new Date(year, emonth-1, eday);
  const goodFriday = new Date(easterSunday); goodFriday.setDate(eday-2);
  const easterMonday = new Date(easterSunday); easterMonday.setDate(eday+1);
  if (goodFriday.getMonth()+1 === month) days.push(goodFriday.getDate());
  if (easterMonday.getMonth()+1 === month) days.push(easterMonday.getDate());
  return days;
}

function workingDays(year, month, daysOff) {
  const days = [];
  const daysInMonth = new Date(year, month, 0).getDate();
  const holidays = czechHolidays(year, month);
  for (let d = 1; d <= daysInMonth; d++) {
    const dt = new Date(year, month-1, d);
    if (dt.getDay() === 0 || dt.getDay() === 6) continue;
    if (daysOff.includes(d)) continue;
    if (holidays.includes(d)) continue;
    days.push(d);
  }
  return days;
}

// ── SMART TASK CLASSIFIER ────────────────────────────────────────────────────
function classifyTask(issue) {
  const type = (issue.type || '').toLowerCase();
  const summary = (issue.summary || '').toLowerCase();
  const key = (issue.key || '').toLowerCase();

  if (type === 'bug' || summary.startsWith('[bug]')) return 'bug';
  if (type.includes('test execution') || summary.includes('test execution') || summary.includes('executing')) return 'execution';
  if (type === 'epic') return 'epic';
  if (key.startsWith('itops-')) return 'blocker';
  if (summary.includes('[security]') || summary.includes('blocker')) return 'blocker';
  return 'story';
}

function taskHours(issue, stdH) {
  switch(classifyTask(issue)) {
    case 'bug':      return 2;
    case 'blocker':  return 3;
    case 'execution': return stdH;  // full day
    case 'epic':     return stdH;   // spreads across days
    case 'story':    return stdH;
    default:         return stdH;
  }
}

function assignTasks(issues, days, extraHours, stdH) {
  if (!issues.length || !days.length) return [];

  // Separate bugs/blockers (short) from main tasks (long)
  const shortTasks = issues.filter(i => ['bug','blocker'].includes(classifyTask(i)));
  const longTasks  = issues.filter(i => !['bug','blocker'].includes(classifyTask(i)));

  // Distribute long tasks across days first
  const dayMap = {}; // day -> [{key, summary, hours}]
  days.forEach(d => { dayMap[d] = []; });

  // Spread long tasks evenly
  if (longTasks.length) {
    const daysPerTask = Math.max(1, Math.floor(days.length / longTasks.length));
    let di = 0;
    longTasks.forEach((iss, ti) => {
      const chunk = ti === longTasks.length - 1 ? days.slice(di) : days.slice(di, di + daysPerTask);
      di += daysPerTask;
      chunk.forEach(d => {
        dayMap[d].push({ key: iss.key, summary: iss.summary, hours: stdH });
      });
    });
  }

  // Sprinkle short tasks (bugs/blockers) into days that have capacity
  // Each bug takes 2-3h, so reduce the main task hours and add bug
  let bugIdx = 0;
  if (shortTasks.length) {
    // Find days to inject bugs — roughly every N days
    const step = Math.max(1, Math.floor(days.length / shortTasks.length));
    days.forEach((d, idx) => {
      if (bugIdx >= shortTasks.length) return;
      if (idx % step !== 0) return;
      const bug = shortTasks[bugIdx++];
      const bugH = classifyTask(bug) === 'blocker' ? 3 : 2;
      const dayH = extraHours[d] ?? stdH;

      // Reduce existing tasks on this day to make room
      const existing = dayMap[d];
      if (existing.length > 0) {
        const mainH = dayH - bugH;
        if (mainH >= 2) {
          existing[0].hours = mainH;
          dayMap[d].push({ key: bug.key, summary: bug.summary, hours: bugH });
        } else {
          // Not enough room — put bug on next available day
          const nextDay = days[idx + 1];
          if (nextDay) {
            const nextH = extraHours[nextDay] ?? stdH;
            const nextExisting = dayMap[nextDay];
            if (nextExisting.length > 0) {
              nextExisting[0].hours = nextH - bugH;
              dayMap[nextDay].push({ key: bug.key, summary: bug.summary, hours: bugH });
            }
          }
        }
      } else {
        dayMap[d].push({ key: bug.key, summary: bug.summary, hours: bugH });
      }
    });
  }

  // Apply extra hours (overtime days) — adjust last task of day
  days.forEach(d => {
    if (!extraHours[d]) return;
    const dayEntries = dayMap[d];
    if (!dayEntries.length) return;
    const currentTotal = dayEntries.reduce((s, e) => s + e.hours, 0);
    const diff = extraHours[d] - currentTotal;
    if (diff > 0) dayEntries[dayEntries.length - 1].hours += diff;
    if (diff < 0) {
      // reduce last entry
      dayEntries[dayEntries.length - 1].hours = Math.max(1, dayEntries[dayEntries.length - 1].hours + diff);
    }
  });

  // Flatten to entries array, skip empty days
  const entries = [];
  days.forEach(d => {
    (dayMap[d] || []).forEach(e => {
      if (e.hours > 0) entries.push({ day: d, key: e.key, summary: e.summary, hours: e.hours });
    });
  });

  return entries;
}

function fmtDate(year, month, day) {
  return `${year}-${String(month).padStart(2,'0')}-${String(day).padStart(2,'0')}`;
}

function taskOptions(selectedKey) {
  let opts = state.issues.map(i =>
    `<option value="${i.key}" ${i.key===selectedKey?'selected':''}>${i.key}</option>`
  );
  // Pokud vybraný task není v seznamu (např. z Claude kontextu), přidej ho
  if (selectedKey && !state.issues.some(i => i.key === selectedKey)) {
    opts.unshift(`<option value="${selectedKey}" selected>${selectedKey}</option>`);
  }
  return opts.join('');
}

function renderPreview() {
  // sort entries by day
  state.entries.sort((a,b) => a.day - b.day);
  const tbody = $('preview-body');
  tbody.innerHTML = '';
  let total = 0;
  state.entries.forEach((e, idx) => {
    const tr = document.createElement('tr');
    const dateStr = new Date(state.year, state.month-1, e.day)
      .toLocaleDateString('cs-CZ', {weekday:'short', day:'2-digit', month:'2-digit'});
    tr.innerHTML = `
      <td class="date">${dateStr}</td>
      <td><select class="task-edit" data-idx="${idx}" style="border:1px solid var(--border);border-radius:4px;padding:0.25rem;font-family:monospace;font-size:0.8rem;font-weight:700;color:var(--red);background:var(--white)">${taskOptions(e.key)}</select></td>
      <td class="summary" title="${e.summary}">${e.summary}</td>
      <td class="hours"><input class="hours-edit" data-idx="${idx}" value="${e.hours}" min="0.5" max="24" step="0.5"></td>
      <td><button class="row-del" data-idx="${idx}" title="Smazat záznam" style="border:none;background:none;color:var(--gray);cursor:pointer;font-size:1rem;padding:0.2rem 0.5rem">×</button></td>
    `;
    tbody.appendChild(tr);
    total += e.hours;
  });
  $('total-h').textContent = total + 'h';

  // Zvýrazni dny kde součet neodpovídá standardu/přesčasu
  const stdH = +$('std-hours').value || 8;
  const dayTotals = {};
  state.entries.forEach(e => { dayTotals[e.day] = (dayTotals[e.day] || 0) + (+e.hours || 0); });
  tbody.querySelectorAll('tr').forEach((tr, i) => {
    const day = state.entries[i]?.day;
    if (!day) return;
    const expected = state.extraHours[day] ?? stdH;
    if (Math.abs((dayTotals[day] || 0) - expected) > 0.01) {
      tr.style.background = 'rgba(230, 51, 41, 0.06)';
      tr.title = `Součet za ${day}. den: ${dayTotals[day]}h (očekáváno ${expected}h)`;
    }
  });

  // chips per task
  const chips = $('task-chips');
  chips.innerHTML = '';
  const taskTotals = {};
  state.entries.forEach(e => { taskTotals[e.key] = (taskTotals[e.key] || 0) + e.hours; });
  Object.entries(taskTotals).forEach(([k, h]) => {
    const chip = document.createElement('div');
    chip.className = 'chip';
    chip.innerHTML = `<span class="ch-key">${k}</span>&nbsp;<span class="ch-h">${h}h</span>`;
    chips.appendChild(chip);
  });

  // listeners
  tbody.querySelectorAll('.hours-edit').forEach(input => {
    input.addEventListener('change', () => {
      const idx = +input.dataset.idx;
      let h = parseFloat(String(input.value).replace(',', '.'));
      if (isNaN(h) || h <= 0) h = 8;
      if (h > 24) h = 24;
      state.entries[idx].hours = h;
      renderPreview();
    });
  });
  tbody.querySelectorAll('.task-edit').forEach(sel => {
    sel.addEventListener('change', () => {
      const idx = +sel.dataset.idx;
      const iss = state.issues.find(i => i.key === sel.value);
      state.entries[idx].key = sel.value;
      state.entries[idx].summary = iss ? iss.summary : sel.value;
      renderPreview();
    });
  });
  tbody.querySelectorAll('.row-del').forEach(btn => {
    btn.addEventListener('click', () => {
      state.entries.splice(+btn.dataset.idx, 1);
      renderPreview();
    });
  });
}

// ── TAG INPUT ─────────────────────────────────────────────────────────────────
function makeTagInput(wrapId, inputId, onAdd) {
  const wrap = $(wrapId), inp = $(inputId);
  wrap.addEventListener('click', () => inp.focus());
  inp.addEventListener('keydown', e => {
    if (e.key === 'Enter' || e.key === ',') {
      e.preventDefault();
      const val = inp.value.trim();
      if (val) { onAdd(val); inp.value = ''; }
    }
    if (e.key === 'Backspace' && !inp.value) {
      const tags = wrap.querySelectorAll('.tag');
      if (tags.length) tags[tags.length-1].remove();
    }
  });
}

function addTag(wrapId, inputId, label, onRemove) {
  const wrap = $(wrapId), inp = $(inputId);
  const tag = document.createElement('div');
  tag.className = 'tag';
  tag.innerHTML = `${label} <button type="button">×</button>`;
  tag.querySelector('button').addEventListener('click', () => { tag.remove(); onRemove(label); });
  wrap.insertBefore(tag, inp);
}

$('btn-fetch').addEventListener('click', async () => {
  const year = +$('sel-year').value;
  const month = +$('sel-month').value;
  if (!year || !month) { alert('Vyber měsíc a rok.'); return; }
  state.year = year; state.month = month;

  $('fetch-spinner').classList.remove('hidden');
  $('btn-fetch').disabled = true;

  try {
    // ── 1. Fetch Jira issues ─────────────────────────────────────────────────
    const lastDay = new Date(year, month, 0).getDate();
    const start = `${year}-${String(month).padStart(2,'0')}-01`;
    const end   = `${year}-${String(month).padStart(2,'0')}-${lastDay}`;
    const jql   = `project in (${PROJECTS.join(',')}) AND assignee = currentUser() AND updated >= "${start}" AND updated <= "${end}" ORDER BY updated ASC`;

    const resp = await fetch(
      `${JIRA_PROXY}/rest/api/3/search/jql?jql=${encodeURIComponent(jql)}&fields=summary,issuetype,status,updated&maxResults=100`,
      { headers: hdr() }
    );
    if (!resp.ok) throw new Error('Jira API: HTTP ' + resp.status);
    const data = await resp.json();
    state.issues = (data.issues || []).map(i => ({
      key: i.key,
      summary: i.fields.summary.slice(0,100),
      updated: i.fields.updated?.slice(0,10) || '',
      type: i.fields.issuetype?.name || '',
      status: i.fields.status?.name || '',
    }));

    if (!state.issues.length) { alert('Žádné tasky nebyly nalezeny.'); return; }

    const stdH = +$('std-hours').value;
    const days = workingDays(year, month, state.daysOff);

    // ── 2. Duplicate protection: zjisti které dny už mají worklogy ───────────
    state.loggedDays = new Set();
    const monthStr = `${year}-${String(month).padStart(2,'0')}`;
    try {
      // Zkontroluj worklogy na všech taskách (paralelně, max 20)
      const checks = state.issues.slice(0, 20).map(async iss => {
        try {
          const wlResp = await fetch(`${JIRA_PROXY}/rest/api/3/issue/${iss.key}/worklog`, { headers: hdr() });
          if (!wlResp.ok) return;
          const wlData = await wlResp.json();
          (wlData.worklogs || []).forEach(w => {
            if (w.started?.startsWith(monthStr) && w.author?.emailAddress === state.auth.email) {
              const day = parseInt(w.started.slice(8, 10));
              state.loggedDays.add(day);
            }
          });
        } catch(e) { /* ignore single issue */ }
      });
      await Promise.all(checks);
    } catch(e) { /* ignore */ }

    if (state.loggedDays.size > 0) {
      const daysList = [...state.loggedDays].sort((a,b)=>a-b).join(', ');
      const proceed = confirm(`⚠ V Clockwork už máš worklogy za dny: ${daysList}.\n\nTyto dny budou automaticky vynechány z návrhu. Pokračovat?`);
      if (!proceed) { $('fetch-spinner').classList.add('hidden'); $('btn-fetch').disabled = false; return; }
    }

    // ── 3. Build schedule ────────────────────────────────────────────────────
    {
      // Check if Claude context JSON was provided
      const ctxRaw = $('claude-context').value.trim();
      if (ctxRaw) {
        try {
          const ctx = JSON.parse(ctxRaw);
          const issueMap = {};
          state.issues.forEach(i => { issueMap[i.key] = i.summary; });
          if (ctx.entries && ctx.entries.length) {
            const dropped = ctx.entries.filter(e => !days.includes(e.day) || state.loggedDays.has(e.day));
            state.entries = ctx.entries
              .filter(e => days.includes(e.day) && !state.loggedDays.has(e.day))
              .map(e => ({
                day: e.day,
                key: e.key,
                summary: issueMap[e.key] || e.key,
                hours: e.hours,
              }));
            let msg = '✓ Použit kontext z Clauda — ' + state.entries.length + ' záznamů.';
            if (dropped.length) {
              const droppedDays = [...new Set(dropped.map(e => e.day))].sort((a,b)=>a-b).join(', ');
              msg += ' ⚠ Vynechány dny ' + droppedDays + ' (víkend, svátek nebo už zalogováno).';
            }
            showStatus('ai-status', dropped.length ? 'warning' : 'success', msg);
          } else {
            throw new Error('Neplatný formát');
          }
        } catch(e) {
          showStatus('ai-status', 'warning', '⚠ Nepodařilo se načíst kontext z Clauda, použit smart algoritmus.');
          state.entries = assignTasks(state.issues, days, state.extraHours, stdH);
        }
      } else {
        const freeDays = days.filter(d => !state.loggedDays.has(d));
        state.entries = assignTasks(state.issues, freeDays, state.extraHours, stdH);
      }
      setStep(3);
    }

    renderPreview();
  } catch(err) {
    alert('Chyba: ' + err.message);
  } finally {
    $('fetch-spinner').classList.add('hidden');
    $('btn-fetch').disabled = false;
  }
});

        'přepis stávajícího logistického systému do nového',
        655,
        'nina.pirkl@packeta.com',
        'Nina','Pirkl','','','','',
        h,
        String(Math.floor(h)).padStart(2,'0') + ':00',
        'Billable','Approved',
        key + ' - ' + tm.summary
      ]);
    });

// ── VALIDACE ──────────────────────────────────────────────────────────────────
function validateEntries() {
  const problems = [];
  const stdH = +$('std-hours').value || 8;

  if (!state.entries.length) {
    problems.push('• Tabulka je prázdná — není co odeslat.');
    return problems;
  }

  // 3: hodiny musí být číslo 0.5–24
  state.entries.forEach(e => {
    const h = +e.hours;
    if (isNaN(h) || h <= 0 || h > 24) {
      problems.push(`• ${e.day}. den, ${e.key}: neplatný počet hodin (${e.hours}).`);
    }
  });

  // 7: klíč tasku musí mít správný formát PROJEKT-ČÍSLO
  state.entries.forEach(e => {
    if (!/^[A-Z][A-Z0-9]+-\d+$/.test(e.key)) {
      problems.push(`• ${e.day}. den: neplatný klíč tasku "${e.key}".`);
    }
  });

  // 4: součet hodin za den musí odpovídat standardu (nebo přesčasu pokud je zadán)
  const dayTotals = {};
  state.entries.forEach(e => { dayTotals[e.day] = (dayTotals[e.day] || 0) + (+e.hours || 0); });
  Object.entries(dayTotals).forEach(([day, total]) => {
    const expected = state.extraHours[+day] ?? stdH;
    if (Math.abs(total - expected) > 0.01) {
      problems.push(`• ${day}. den: součet ${total}h ≠ očekávaných ${expected}h${state.extraHours[+day] ? ' (přesčas)' : ''}.`);
    }
  });

  return problems;
}

$('btn-addrow').addEventListener('click', addEntryRow);

// ── BACK BUTTONS ──────────────────────────────────────────────────────────────
$('btn-back1').addEventListener('click', () => setStep(1));
$('btn-reset').addEventListener('click', () => {
  state.entries = []; state.issues = [];
  setStep(2);
});
$('btn-back3').addEventListener('click', () => {
  $('btn-again').classList.add('hidden');
  $('btn-back3').classList.add('hidden');
  setStep(3);
});

// ── YEAR SELECT INIT ──────────────────────────────────────────────────────────
(function() {
  const selY = $('sel-year');
  const now = new Date();
  for (let y = now.getFullYear(); y >= now.getFullYear()-2; y--) {
    const opt = document.createElement('option');
    opt.value = y; opt.textContent = y;
    selY.appendChild(opt);
  }
  // default: previous month
  const pm = new Date(now.getFullYear(), now.getMonth()-1, 1);
  $('sel-year').value = pm.getFullYear();
  $('sel-month').value = pm.getMonth()+1;
})();

// ── INIT ──────────────────────────────────────────────────────────────────────
setStep(1);
</script>
